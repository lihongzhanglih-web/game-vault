<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - 遊戲資源庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a0a0f; --bg-card: #12121a; --accent-primary: #ff6b9d; --accent-secondary: #c792ea; --accent-tertiary: #7ee8fa; --text-primary: #ffffff; --text-secondary: #b8b8c8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(10,10,15,0.4) 0%, rgba(10,10,15,0.95) 100%), url('https://images7.alphacoders.com/134/1348250.jpeg'); background-size: cover; z-index: -2; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--accent-primary); border-radius: 50%; animation: float 15s infinite; opacity: 0.6; }
        @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 15px 30px; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { font-size: 0.9rem; opacity: 0.7; }
        nav { display: flex; gap: 25px; }
        nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; }
        nav a:hover { color: var(--accent-primary); }
        .music-btn { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; padding: 8px 16px; border-radius: 20px; color: #fff; cursor: pointer; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px 20px; }
        .hero-avatar { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent-primary); box-shadow: 0 0 40px rgba(255,107,157,0.5); margin-bottom: 30px; animation: pulse 2s infinite; background: url('https://images4.alphacoders.com/134/1348250.jpeg'); background-size: cover; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px rgba(255,107,157,0.5); } 50% { box-shadow: 0 0 60px rgba(255,107,157,0.8); } }
        .hero h1 { font-family: 'Orbitron'; font-size: 3.5rem; margin-bottom: 15px; }
        .hero h1 .highlight { background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.2rem; color: var(--text-secondary); max-width: 550px; margin-bottom: 35px; }
        .hero-btns { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 14px 35px; border-radius: 30px; font-size: 1rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), #ff8fab); color: #fff; box-shadow: 0 0 25px rgba(255,107,157,0.4); }
        .btn-primary:hover { transform: translateY(-3px); }
        .btn-secondary { background: transparent; border: 2px solid var(--accent-secondary); color: #fff; }
        .btn-secondary:hover { background: var(--accent-secondary); }
        .section { padding: 60px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-family: 'Orbitron'; font-size: 1.8rem; margin-bottom: 35px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .section-title::before, .section-title::after { content: '✦'; color: var(--accent-primary); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: rgba(18,18,26,0.9); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent-secondary); box-shadow: 0 20px 50px rgba(199,146,234,0.2); }
        .game-cover { height: 220px; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; }
        .game-cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .game-badge { position: absolute; top: 10px; right: 10px; background: var(--accent-primary); padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; }
        .game-badge.new { background: #00d4ff; }
        .game-info { padding: 20px; }
        .game-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .game-meta { display: flex; gap: 15px; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 12px; }
        .game-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { padding: 4px 10px; background: rgba(255,107,157,0.15); color: var(--accent-primary); border-radius: 12px; font-size: 0.75rem; }
        .game-link { display: inline-block; color: var(--accent-tertiary); text-decoration: none; font-weight: 500; }
        .game-link:hover { text-decoration: underline; }
        .artists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .artist-card { background: rgba(18,18,26,0.8); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .artist-card:hover { transform: scale(1.03); }
        .artist-cover { height: 250px; overflow: hidden; }
        .artist-cover img { width: 100%; height: 100%; object-fit: cover; }
        .artist-info { padding: 15px; }
        .artist-name { font-weight: 600; margin-bottom: 5px; }
        .artist-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .category-card { background: rgba(18,18,26,0.8); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .category-card:hover { transform: translateY(-8px); border-color: var(--accent-primary); }
        .category-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .category-name { font-weight: 600; }
        .category-count { color: var(--text-secondary); font-size: 0.85rem; }
        .upload-section { background: rgba(18,18,26,0.8); border-radius: 25px; padding: 50px; border: 2px dashed rgba(255,107,157,0.3); text-align: center; margin: 40px 0; }
        .upload-icon { font-size: 4rem; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        footer { text-align: center; padding: 40px; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border-radius: 25px; padding: 40px; max-width: 400px; width: 90%; text-align: center; border: 1px solid var(--accent-primary); }
        .modal h2 { color: var(--accent-primary); margin-bottom: 20px; font-family: 'Orbitron'; }
        .modal input { width: 100%; padding: 14px; background: var(--bg-dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem; margin-bottom: 15px; }
        .modal input:focus { outline: none; border-color: var(--accent-primary); }
        .error-msg { color: #ff6b6b; font-size: 0.9rem; display: none; }
    </style>
</head>
